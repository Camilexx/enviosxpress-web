<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Primary -->
  <title>EnviosXpress | Courier Nacional Ecuador — Envíos Seguros en 24h</title>
  <meta name="description"
    content="EnviosXpress: servicio de courier y paquetería nacional en Ecuador. Cotiza al instante, envíos express en 24h, cobertura en las 24 provincias. Contraentrega COD y logística B2B." />
  <meta name="keywords"
    content="courier Ecuador, envíos nacionales Ecuador, paquetería express, envíos Quito Guayaquil, contraentrega COD Ecuador, logística B2B Ecuador, EnviosXpress" />
  <meta name="author" content="EnviosXpress S.A." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://enviosxpress.ec" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://enviosxpress.ec" />
  <meta property="og:title" content="EnviosXpress | Courier Nacional Ecuador — Envíos Seguros en 24h" />
  <meta property="og:description"
    content="Servicio de courier premium en Ecuador. Cotiza al instante, cobertura en 24 provincias, entregas express en 24h." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:locale" content="es_EC" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="EnviosXpress | Courier Nacional Ecuador" />
  <meta name="twitter:description"
    content="Servicio de courier premium en Ecuador. Cotiza al instante, cobertura en 24 provincias." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "DeliveryService"],
      "name": "EnviosXpress",
      "description": "Servicio de courier premium en Ecuador. Envíos nacionales en 24 horas garantizados.",
      "url": "https://enviosxpress.ec",
      "logo": "https://enviosxpress.ec/favicon.svg",
      "image": "https://enviosxpress.ec/og-image.png",
      "telephone": "+593967489002",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Av. República El Salvador",
        "addressLocality": "Quito",
        "addressRegion": "Pichincha",
        "postalCode": "170150",
        "addressCountry": "EC"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -0.180653,
        "longitude": -78.484111
      },
      "areaServed": "Ecuador",
      "sameAs": [
        "https://www.facebook.com/enviosxpress",
        "https://www.instagram.com/enviosxpress"
      ],
      "availableDeliveryMethod": {
        "@type": "DeliveryMethod",
        "name": "Envío Express 24h"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
        "opens": "08:00",
        "closes": "20:00"
      }
    }
    </script>

  <!-- Theme Color -->
  <meta name="theme-color" content="#722F37" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
